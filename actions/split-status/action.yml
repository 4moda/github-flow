name: issue-driven-flow split-status
description: >-
  Resolve a just-closed issue's flow/split parent (if any) via GitHub's
  native Sub-issues API, and decide whether every one of that parent's
  native sub-issues is now closed. Wraps scripts/gf.py so sync-pr.yml can
  react to a completed split mechanically.
inputs:
  issue-number:
    description: Number of the issue that just closed
    required: true
outputs:
  parent-number:
    description: >-
      The flow/split parent's issue number, or empty when the closed issue
      has no native parent
    value: ${{ steps.status.outputs.parent-number }}
  complete:
    description: >-
      "true" when every one of the parent's native sub-issues is closed,
      else "false" (including when there is no parent)
    value: ${{ steps.status.outputs.complete }}
runs:
  using: composite
  steps:
    - id: status
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        ISSUE: ${{ inputs.issue-number }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        gf="${ACTION_PATH}/../../scripts/gf.py"

        parent_json="$(gh api "repos/${REPO}/issues/${ISSUE}/parent" 2>/dev/null)" \
          || parent_json="null"
        parent_number="$(python3 "$gf" split-parent <<<"$parent_json")"
        echo "parent-number=${parent_number}" >> "$GITHUB_OUTPUT"
        if [ -z "$parent_number" ]; then
          echo "complete=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        siblings="$(gh api "repos/${REPO}/issues/${parent_number}/sub_issues")"
        complete="$(python3 "$gf" split-complete <<<"$siblings")"
        echo "complete=${complete}" >> "$GITHUB_OUTPUT"
